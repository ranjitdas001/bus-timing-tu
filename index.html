<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TU Bus Schedule</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Inter', sans-serif;
    background: #f0f0ee;
    color: #111;
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    padding: 28px 20px 16px;
    max-width: 680px;
    margin: 0 auto;
  }

  .uni {
    font-size: 11px;
    color: #666;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: #111;
    line-height: 1.2;
  }

  h1 span { color: #888; font-weight: 400; }

  .validity {
    font-size: 12px;
    color: #777;
    margin-top: 4px;
  }

  /* ── CONTROLS ── */
  .controls {
    max-width: 680px;
    margin: 0 auto;
    padding: 0 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .seg {
    display: flex;
    background: #fff;
    border: 1.5px solid #ccc;
    border-radius: 12px;
    overflow: hidden;
  }

  .seg-btn {
    flex: 1;
    padding: 10px 8px;
    background: none;
    border: none;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: #555;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
    position: relative;
  }

  .seg-btn + .seg-btn { border-left: 1.5px solid #e0e0e0; }

  .seg-btn.on {
    background: #111;
    color: #fff;
    font-weight: 600;
  }

  .seg-btn:active { opacity: 0.75; }

  .search-wrap { position: relative; }

  input[type=text] {
    width: 100%;
    padding: 11px 14px 11px 38px;
    border: 1.5px solid #ccc;
    border-radius: 12px;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    background: #fff;
    color: #111;
    outline: none;
    transition: border-color 0.15s;
    -webkit-appearance: none;
  }

  input[type=text]:focus { border-color: #555; }
  input[type=text]::placeholder { color: #aaa; }

  .search-icon {
    position: absolute;
    left: 13px;
    top: 50%;
    transform: translateY(-50%);
    color: #aaa;
    pointer-events: none;
  }

  /* ── CONTENT WRAP ── */
  .content {
    max-width: 680px;
    margin: 0 auto;
    padding: 0 20px 80px;
    min-height: 400px;
  }

  .count {
    font-size: 12px;
    color: #666;
    margin-bottom: 12px;
    min-height: 18px;
  }

  /* ── CARD LIST (mobile default) ── */
  .card-list { display: flex; flex-direction: column; gap: 8px; }

  .card {
    background: #fff;
    border: 1px solid #ddd;
    border-radius: 12px;
    padding: 14px 16px;
    display: grid;
    grid-template-columns: 72px 1fr;
    grid-template-rows: auto auto;
    gap: 6px 12px;
    align-items: start;
  }

  .card-time {
    grid-row: 1 / 3;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    padding-top: 2px;
  }

  .card-hhmm {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.03em;
    line-height: 1;
    color: #111;
  }

  .card-ampm {
    font-size: 11px;
    font-weight: 500;
    color: #777;
    margin-top: 2px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .card-top {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  .bus {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 28px;
    height: 28px;
    border-radius: 7px;
    font-size: 12px;
    font-weight: 700;
    flex-shrink: 0;
  }

  .b1 { background: #d0e4ff; color: #1048a8; }
  .b2 { background: #c8f0d4; color: #116630; }
  .b3 { background: #ffe8b0; color: #8a5200; }
  .b4 { background: #e8d4ff; color: #5a0fa0; }

  .dir-tag {
    font-size: 12px;
    font-weight: 600;
    padding: 3px 9px;
    border-radius: 20px;
  }

  .dir-to   { background: #ddeeff; color: #1048a8; }
  .dir-from { background: #ffe0dc; color: #a80000; }

  .night-tag {
    font-size: 10px;
    font-weight: 600;
    background: #ffd4d4;
    color: #a80000;
    border-radius: 4px;
    padding: 2px 6px;
  }

  .card-stops {
    font-size: 12px;
    color: #555;
    line-height: 1.6;
  }

  /* ── DESKTOP TABLE ── */
  .desk-table { display: none; }

  /* ── EMPTY ── */
  .empty {
    padding: 60px 0;
    text-align: center;
    color: #999;
    font-size: 14px;
  }

  /* ── DESKTOP ── */
  @media (min-width: 560px) {
    header { padding: 32px 24px 20px; }
    h1 { font-size: 24px; }

    .controls { padding: 0 24px 20px; }
    .content  { padding: 0 24px 80px; }

    .card-list { display: none; }
    .desk-table { display: block; }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    col.c-time  { width: 90px; }
    col.c-bus   { width: 100px; }
    col.c-dir   { width: 120px; }
    col.c-stops { width: auto; }

    thead tr { border-bottom: 2px solid #ccc; }

    th {
      text-align: left;
      font-size: 11px;
      font-weight: 600;
      color: #555;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 0 8px 10px 0;
    }

    th:last-child { text-align: right; padding-right: 0; }

    tbody tr {
      border-bottom: 1px solid #ddd;
      transition: background 0.1s;
    }

    tbody tr:hover { background: #e8e8e5; }

    td {
      padding: 13px 8px 13px 0;
      vertical-align: middle;
      overflow: hidden;
    }

    td:last-child { padding-right: 0; }

    .t {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.01em;
      white-space: nowrap;
      display: block;
      color: #111;
    }

    .ampm { font-size: 11px; font-weight: 500; color: #555; margin-left: 2px; }

    .bus-cell { display: flex; align-items: center; gap: 6px; }

    .dir { font-size: 13px; font-weight: 600; white-space: nowrap; }

    .stops {
      font-size: 12px;
      color: #444;
      text-align: right;
      line-height: 1.6;
      word-break: break-word;
    }

    .night {
      display: inline-block;
      background: #ffd4d4;
      color: #a80000;
      font-size: 10px;
      font-weight: 600;
      border-radius: 4px;
      padding: 1px 5px;
      white-space: nowrap;
    }
  }
</style>
</head>
<body>

<header>
  <div class="uni">Tezpur University · ASTC Bus Service</div>
  <h1>Bus Schedule <span>2026</span></h1>
  <div class="validity">1 March – 31 October 2026</div>
</header>

<div class="controls">
  <div class="seg">
    <button class="seg-btn on" id="dWeekday" onclick="setDay('weekday',this)">Weekdays</button>
    <button class="seg-btn"    id="dHoliday" onclick="setDay('holiday',this)">Sat &amp; Sun</button>
  </div>
  <div class="seg">
    <button class="seg-btn on" id="dirAll"  onclick="setDir('both',this)">Both ways</button>
    <button class="seg-btn"    id="dirTo"   onclick="setDir('to',this)">→ Campus</button>
    <button class="seg-btn"    id="dirFrom" onclick="setDir('from',this)">→ ASTC</button>
  </div>
  <div class="search-wrap">
    <svg class="search-icon" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input type="text" id="q" placeholder="Search stop, bus or time…" oninput="render()">
  </div>
</div>

<div class="content">
  <div class="count" id="count"></div>

  <!-- Mobile cards -->
  <div class="card-list" id="cardList"></div>

  <!-- Desktop table -->
  <div class="desk-table">
    <table id="tbl">
      <colgroup>
        <col class="c-time">
        <col class="c-bus">
        <col class="c-dir">
        <col class="c-stops">
      </colgroup>
      <thead>
        <tr>
          <th>Time</th>
          <th>Bus</th>
          <th>Direction</th>
          <th style="text-align:right">Stops</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

  <div class="empty" id="empty" style="display:none">No trips found.</div>
</div>

<script>
const DATA = {
  weekday: {
    to: [
      { time:"06:00 AM", bus:"I",   night:false, stops:["Tribeni","Mission Chariali","Parowa","Dolabari"] },
      { time:"08:20 AM", bus:"I",   night:false, stops:["Tribeni","Murhateteli","Vartak","Mazgaon","Dhanua Nagar","Parowa","Dolabari"] },
      { time:"08:20 AM", bus:"II",  night:false, stops:["Railgate","Murhateteli","Ketekibari","Mission Chariali","Parowa","Dolabari"] },
      { time:"08:20 AM", bus:"III", night:false, stops:["Idgah","Mahabhairab","Darrang College (East)","Dhanua Nagar","Parowa","Dolabari"] },
      { time:"11:00 AM", bus:"II",  night:false, stops:["Tribeni","Vartak","Mazgaon","Dhanua Nagar","Parowa","Dolabari"] },
      { time:"02:30 PM", bus:"I",   night:false, stops:["Tribeni","Vartak","Mazgaon","Dhanua Nagar","Parowa","Dolabari"] },
      { time:"04:00 PM", bus:"III", night:false, stops:["Tribeni","Vartak","Mazgaon","Dhanua Nagar","Parowa","Dolabari"] },
      { time:"07:00 PM", bus:"II",  night:false, stops:["Tribeni","Vartak","Mazgaon","Dhanua Nagar","Parowa","Dolabari"] },
      { time:"08:00 PM", bus:"III", night:true,  stops:["Tribeni","Mission Chariali","Parowa","Dolabari"] },
      { time:"08:00 PM", bus:"IV",  night:false, stops:["Tribeni","Vartak","Mazgaon","Dhanua Nagar","Parowa","Dolabari"] },
    ],
    from: [
      { time:"06:00 AM", bus:"III", night:false, stops:["Dolabari","Parowa","Dhanua Nagar","Mazgaon","Vartak","Tribeni"] },
      { time:"07:15 AM", bus:"I",   night:false, stops:["Dolabari","Parowa","Dhanua Nagar","Mazgaon","Vartak","Tribeni"] },
      { time:"09:30 AM", bus:"II",  night:false, stops:["Dolabari","Parowa","Dhanua Nagar","Mazgaon","Vartak","Tribeni"] },
      { time:"01:45 PM", bus:"I",   night:false, stops:["Dolabari","Parowa","Dhanua Nagar","Mazgaon","Vartak","Tribeni"] },
      { time:"03:00 PM", bus:"III", night:false, stops:["Dolabari","Parowa","Dhanua Nagar","Mazgaon","Vartak","Tribeni"] },
      { time:"04:40 PM", bus:"II",  night:false, stops:["Dolabari","Parowa","Dhanua Nagar","Mazgaon","Vartak","Tribeni"] },
      { time:"05:40 PM", bus:"I",   night:false, stops:["Dolabari","Parowa","Dhanua Nagar","Mazgaon","Vartak","Murhateteli","Tribeni"] },
      { time:"05:40 PM", bus:"III", night:false, stops:["Dolabari","Parowa","Dhanua Nagar","Mazgaon","Vartak","Murhateteli","Railgate"] },
      { time:"08:00 PM", bus:"II",  night:false, stops:["Dolabari","Parowa","Dhanua Nagar","Mazgaon","Vartak","Tribeni"] },
      { time:"08:45 PM", bus:"IV",  night:false, stops:["Dolabari","Parowa","Dhanua Nagar","Mazgaon","Vartak","Tribeni"] },
    ]
  },
  holiday: {
    to: [
      { time:"06:00 AM", bus:"I",   night:false, stops:["Tribeni","Vartak","Mission Chariali","Parowa","Dolabari"] },
      { time:"10:30 AM", bus:"II",  night:false, stops:["Tribeni","Vartak","Mazgaon","Dhanua Nagar","Parowa","Dolabari"] },
      { time:"11:00 AM", bus:"IV",  night:false, stops:["Tribeni","Vartak","Mazgaon","Dhanua Nagar","Parowa","Dolabari"] },
      { time:"12:30 PM", bus:"III", night:false, stops:["Tribeni","Vartak","Mazgaon","Dhanua Nagar","Parowa","Dolabari"] },
      { time:"03:30 PM", bus:"I",   night:false, stops:["Tribeni","Vartak","Mazgaon","Dhanua Nagar","Parowa","Dolabari"] },
      { time:"05:30 PM", bus:"II",  night:false, stops:["Tribeni","Vartak","Mazgaon","Dhanua Nagar","Parowa","Dolabari"] },
      { time:"06:30 PM", bus:"III", night:false, stops:["Tribeni","Vartak","Mazgaon","Dhanua Nagar","Parowa","Dolabari"] },
      { time:"07:30 PM", bus:"I",   night:false, stops:["Tribeni","Vartak","Mazgaon","Dhanua Nagar","Parowa","Dolabari"] },
      { time:"07:30 PM", bus:"II",  night:false, stops:["Tribeni","Vartak","Mazgaon","Dhanua Nagar","Parowa","Dolabari"] },
      { time:"08:00 PM", bus:"III", night:true,  stops:["Tribeni","Vartak","Mission Chariali","Parowa","Dolabari"] },
      { time:"08:00 PM", bus:"IV",  night:false, stops:["Tribeni","Vartak","Mission Chariali","Parowa","Dolabari"] },
    ],
    from: [
      { time:"06:00 AM", bus:"III", night:false, stops:["Dolabari","Parowa","Dhanua Nagar","Mazgaon","Vartak","Tribeni"] },
      { time:"09:30 AM", bus:"I",   night:false, stops:["Dolabari","Parowa","Dhanua Nagar","Mazgaon","Vartak","Tribeni"] },
      { time:"11:30 AM", bus:"II",  night:false, stops:["Dolabari","Parowa","Dhanua Nagar","Mazgaon","Vartak","Tribeni"] },
      { time:"12:30 PM", bus:"IV",  night:false, stops:["Dolabari","Parowa","Dhanua Nagar","Mazgaon","Vartak","Tribeni"] },
      { time:"01:30 PM", bus:"III", night:false, stops:["Dolabari","Parowa","Dhanua Nagar","Mazgaon","Vartak","Tribeni"] },
      { time:"04:10 PM", bus:"I",   night:false, stops:["Dolabari","Parowa","Dhanua Nagar","Mazgaon","Vartak","Tribeni"] },
      { time:"06:10 PM", bus:"II",  night:false, stops:["Dolabari","Parowa","Dhanua Nagar","Mazgaon","Vartak","Tribeni"] },
      { time:"07:00 PM", bus:"III", night:false, stops:["Dolabari","Parowa","Dhanua Nagar","Mazgaon","Vartak","Tribeni"] },
      { time:"08:00 PM", bus:"I",   night:false, stops:["Dolabari","Parowa","Dhanua Nagar","Mazgaon","Vartak","Tribeni"] },
      { time:"08:00 PM", bus:"II",  night:false, stops:["Dolabari","Parowa","Dhanua Nagar","Mazgaon","Vartak","Tribeni"] },
      { time:"08:45 PM", bus:"IV",  night:false, stops:["Dolabari","Parowa","Dhanua Nagar","Mazgaon","Vartak","Tribeni"] },
    ]
  }
};

let day = 'weekday', dir = 'both';
const bc = { I:'b1', II:'b2', III:'b3', IV:'b4' };

function toMins(t) {
  const [time, p] = t.split(' ');
  let [h, m] = time.split(':').map(Number);
  if (p === 'PM' && h !== 12) h += 12;
  if (p === 'AM' && h === 12) h = 0;
  return h * 60 + m;
}

function setDay(d, el) {
  day = d;
  document.querySelectorAll('#dWeekday,#dHoliday').forEach(b => b.className = 'seg-btn');
  el.classList.add('on');
  render();
}

function setDir(d, el) {
  dir = d;
  document.querySelectorAll('#dirAll,#dirTo,#dirFrom').forEach(b => b.className = 'seg-btn');
  el.classList.add('on');
  render();
}

function render() {
  const q = document.getElementById('q').value.toLowerCase().trim();
  let rows = [];
  if (dir !== 'from') DATA[day].to.forEach(r => rows.push({...r, d:'to'}));
  if (dir !== 'to')   DATA[day].from.forEach(r => rows.push({...r, d:'from'}));
  rows.sort((a,b) => toMins(a.time) - toMins(b.time));
  if (q) rows = rows.filter(r =>
    r.time.toLowerCase().includes(q) ||
    r.bus.toLowerCase().includes(q) ||
    r.stops.some(s => s.toLowerCase().includes(q))
  );

  const isEmpty = rows.length === 0;
  document.getElementById('empty').style.display = isEmpty ? 'block' : 'none';
  document.getElementById('count').textContent = isEmpty ? '' : rows.length + ' trip' + (rows.length !== 1 ? 's' : '');

  // ── MOBILE CARDS ──
  const cardList = document.getElementById('cardList');
  cardList.innerHTML = '';
  rows.forEach(r => {
    const [hhmm, ap] = r.time.split(' ');
    const dirClass = r.d === 'to' ? 'dir-to' : 'dir-from';
    const dirText  = r.d === 'to' ? '→ Campus' : '→ ASTC';
    const nightTag = r.night ? '<span class="night-tag">Night Stay</span>' : '';
    const div = document.createElement('div');
    div.className = 'card';
    div.innerHTML = `
      <div class="card-time">
        <div class="card-hhmm">${hhmm}</div>
        <div class="card-ampm">${ap}</div>
      </div>
      <div class="card-top">
        <span class="bus ${bc[r.bus]}">${r.bus}${r.night?'*':''}</span>
        <span class="dir-tag ${dirClass}">${dirText}</span>
        ${nightTag}
      </div>
      <div class="card-stops">${r.stops.join(' · ')}</div>
    `;
    cardList.appendChild(div);
  });

  // ── DESKTOP TABLE ──
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';
  rows.forEach(r => {
    const [t, ap] = r.time.split(' ');
    const dirColor = r.d === 'to' ? '#1048a8' : '#a80000';
    const dirText  = r.d === 'to' ? '→ Campus' : '→ ASTC';
    const night    = r.night ? '<span class="night">Night Stay</span>' : '';
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td><span class="t">${t}<span class="ampm">${ap}</span></span></td>
      <td><div class="bus-cell"><span class="bus ${bc[r.bus]}">${r.bus}${r.night?'*':''}</span>${night}</div></td>
      <td><span class="dir" style="color:${dirColor}">${dirText}</span></td>
      <td><div class="stops">${r.stops.join(' · ')}</div></td>
    `;
    tbody.appendChild(tr);
  });
}

render();
</script>
</body>
</html>
